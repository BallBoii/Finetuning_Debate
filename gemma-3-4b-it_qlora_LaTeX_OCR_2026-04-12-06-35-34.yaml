training:
  max_seq_length: 2048
  num_epochs: 0
  learning_rate: 0.0005
  batch_size: 2
  gradient_accumulation_steps: 4
  warmup_steps: 5
  max_steps: 10
  save_steps: 30
  eval_steps: 0
  weight_decay: 0.001
  random_seed: 3407
  packing: false
  train_on_completions: false
  gradient_checkpointing: unsloth
  optim: adamw_8bit
  lr_scheduler_type: linear
lora:
  lora_r: 8
  lora_alpha: 8
  lora_dropout: 0
  target_modules:
    - all-linear
  use_rslora: false
  use_loftq: false
  finetune_vision_layers: true
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true
