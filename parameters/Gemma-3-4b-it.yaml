training:
  max_seq_length: 16384
  num_epochs: 3
  learning_rate: 2e-5
  batch_size: 1
  gradient_accumulation_steps: 8 
  warmup_steps: 35
  max_steps: 0
  save_steps: 110
  eval_steps: 110
  weight_decay: 0.01
  random_seed: 3407
  packing: false
  train_on_completions: true
  gradient_checkpointing: unsloth
  optim: adamw_8bit
  lr_scheduler_type: cosine

lora:
  lora_r: 64
  lora_alpha: 64
  lora_dropout: 0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  use_rslora: true
  use_loftq: false
  finetune_vision_layers: false 
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true